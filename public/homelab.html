<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="networkMap">Network Map</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235b8cff' stroke-width='2'><rect x='2' y='3' width='20' height='14' rx='2'/><path d='m8 21 8 0M12 17v4'/><path d='m7 8 2 2-2 2M11 12h4'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<script src="/js/header.js"></script>
<link rel="stylesheet" href="/css/homelab.css">
</head>
<body>
<div class="layout">
  

  <div class="main">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="19" cy="19" r="3"/><circle cx="5" cy="19" r="3"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="12" y1="14" x2="19" y2="19"/><line x1="12" y1="14" x2="5" y2="19"/></svg>
        <span data-i18n="networkMap">Network Map</span>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title" data-i18n="scanNetwork">Scan Network</div>
        <div class="scan-row">
          <input type="text" class="scan-input" id="scanCidr" placeholder="192.168.1.0/24" value="192.168.1.0/24">
          <button class="btn btn-primary" id="btnScan" data-i18n="scan">Scan</button>
        </div>
        <div class="scan-row">
          <button class="btn btn-secondary btn-sm" id="btnCheckStatus" data-i18n="checkStatus">Check Status</button>
          <button class="btn btn-secondary btn-sm" id="btnClearPending" data-i18n="clearPending">Clear Pending</button>
        </div>
        <div class="scan-progress" id="scanProgress">
          <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
          <div class="progress-text" id="progressText">0 / 0</div>
        </div>
      </div>

      <div class="sidebar-section" style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div class="sidebar-section-title" data-i18n="pendingDevices">Pending Devices</div>
        <div class="pending-list" id="pendingList">
          <div class="pending-empty" data-i18n="noPendingDevices">No pending devices</div>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title" data-i18n="filters">Filters</div>
        <div class="scan-row">
          <select class="detail-input detail-select" id="filterType" style="flex:1;">
            <option value="all" data-i18n="allTypes">All Types</option>
          </select>
          <select class="detail-input detail-select" id="filterStatus" style="flex:1;">
            <option value="all" data-i18n="allStatus">All Status</option>
            <option value="online" data-i18n="statusOnline">Online</option>
            <option value="offline" data-i18n="statusOffline">Offline</option>
          </select>
        </div>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title" data-i18n="actions">Actions</div>
        <div class="scan-row">
          <button class="btn btn-secondary btn-sm" id="btnExport" data-i18n="export">Export</button>
          <button class="btn btn-secondary btn-sm" id="btnImport" data-i18n="import">Import</button>
          <input type="file" id="importFile" accept=".json" style="display:none;">
        </div>
        <div class="scan-row">
          <button class="btn btn-secondary btn-sm" id="btnToggleHistory" data-i18n="scanHistory">Scan History</button>
        </div>
        <div id="historyPanel" style="display:none;margin-top:8px;">
          <div class="pending-list" id="historyList" style="max-height:150px;">
            <div class="pending-empty">No history</div>
          </div>
        </div>
      </div>

      <div class="sidebar-section" id="detailPanel" style="display:none;">
        <div class="sidebar-section-title" data-i18n="deviceDetails">Device Details</div>
        <div class="detail-field">
          <div class="detail-label" data-i18n="ip">IP</div>
          <input type="text" class="detail-input" id="detailIp" readonly>
        </div>
        <div class="detail-field">
          <div class="detail-label" data-i18n="mac">MAC</div>
          <input type="text" class="detail-input" id="detailMac">
        </div>
        <div class="detail-field">
          <div class="detail-label" data-i18n="name">Name</div>
          <input type="text" class="detail-input" id="detailName">
        </div>
        <div class="detail-field">
          <div class="detail-label" data-i18n="type">Type</div>
          <select class="detail-input detail-select" id="detailType"></select>
        </div>
        <div class="detail-field" id="detailPortsRow">
          <div class="detail-label" data-i18n="ports">Ports</div>
          <input type="text" class="detail-input" id="detailPorts">
        </div>
        <div class="scan-row" style="margin-top:8px;">
          <button class="btn btn-primary btn-sm" id="btnSaveDevice" data-i18n="save">Save</button>
          <button class="btn btn-secondary btn-sm" id="btnDeleteDevice" data-i18n="delete">Delete</button>
        </div>
      </div>
    </div>

    <div class="canvas-wrapper">
      <svg id="networkSvg"></svg>
      <div class="mini-toolbar">
        <button id="toolSelect" class="active" data-i18n="panSelect" data-i18n-attr="title" title="Pan / Select"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"/></svg></button>

        <button id="btnZoomIn" data-i18n="zoomIn" data-i18n-attr="title" title="Zoom In">+</button>
        <button id="btnZoomOut" data-i18n="zoomOut" data-i18n-attr="title" title="Zoom Out">−</button>
        <button id="btnZoomFit" data-i18n="fit" data-i18n-attr="title" title="Fit">Fit</button>
        <button id="btnToggleGrid" class="active" data-i18n="grid" data-i18n-attr="title" title="Grid"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h18v18H3z"/><path d="M3 9h18M3 15h18M9 3v18M15 3v18"/></svg></button>
      </div>
    </div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>
<div class="context-menu" id="contextMenu"></div>
<div class="toast-container" id="toastContainer"></div>

<!-- Link Type Modal -->
<div id="linkTypeModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center;">
  <div style="background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:20px;width:280px;box-shadow:0 16px 48px rgba(0,0,0,.5);">
    <div style="font-weight:600;margin-bottom:12px;font-size:14px;" data-i18n="selectLinkType">Select Link Type</div>
    <select class="detail-input detail-select" id="linkTypeSelect" style="margin-bottom:16px;">
      <option value="ethernet">Ethernet</option>
      <option value="wifi">Wi-Fi</option>
      <option value="vpn">VPN</option>
      <option value="docker">Docker Network</option>
      <option value="lxc">LXC Bridge</option>
    </select>
    <div class="scan-row" style="margin-bottom:0;">
      <button class="btn btn-secondary btn-sm" id="btnCancelLink" data-i18n="cancel">Cancel</button>
      <button class="btn btn-primary btn-sm" id="btnConfirmLink" data-i18n="create">Create</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script>
function toggleProfileDropdown() {
  const existing = document.getElementById('profileDropdown');
  if (existing) { existing.remove(); return; }
  const btn = document.getElementById('profileBlock');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();
  const html = `<div class="proj-dropdown-item" onclick="logout();document.getElementById('profileDropdown')?.remove()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    ${I18N.t('logout')}
  </div>`;
  const dd = document.createElement('div');
  dd.id = 'profileDropdown';
  dd.className = 'proj-dropdown';
  dd.style.top = (rect.bottom + 4) + 'px';
  const ddWidth = Math.max(rect.width, 140);
  dd.style.width = ddWidth + 'px';
  if (rect.left + ddWidth > window.innerWidth - 8) {
    dd.style.left = 'auto';
    dd.style.right = (window.innerWidth - rect.right) + 'px';
  } else {
    dd.style.left = rect.left + 'px';
    dd.style.right = 'auto';
  }
  dd.innerHTML = html;
  document.body.appendChild(dd);
  requestAnimationFrame(() => {
    document.addEventListener('click', function close(e) {
      if (!dd.contains(e.target) && e.target !== btn) { dd.remove(); document.removeEventListener('click', close); }
    });
  });
}
async function logout() {
  try { await fetch('/api/logout', { method: 'POST' }); } catch {}
  window.location.href = '/login.html';
}
async function loadUser() {
  try {
    const r = await fetch('/api/me', { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    if (d.enabled && d.user) {
      const el = document.getElementById('profileName');
      if (el) el.textContent = d.user.name;
      const av = document.getElementById('profileAvatar');
      if (av) {
        if (d.user.avatar) {
          av.style.display = '';
          av.innerHTML = `<img src="${d.user.avatar}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;">`;
        } else {
          av.style.display = 'none';
        }
      }
    } else {
      // Auth disabled or no user data — hide skeleton
      const el = document.getElementById('profileName');
      if (el) el.textContent = 'User';
    }
  } catch {}
}
</script>
<script src="js/i18n.js"></script>
<script src="js/themes.js"></script>
<script src="js/network-icons.js"></script>
<script src="js/network-canvas.js"></script>
<script src="js/network-sidebar.js"></script>
<script src="js/homelab.js"></script>
<script>
document.addEventListener('DOMContentLoaded', async () => {
  await I18N.init();
  Header.init({
    container: document.querySelector('.layout'),
    showLang: true,
    showGitHub: true,
    center: '<a class="btn active" href="/homelab.html" data-i18n="networkMap">Network Map</a><a class="btn" href="/map.html" data-i18n="containerMap">Container Map</a>'
  });
  I18N.refresh();
  document.body.style.visibility = 'visible';
});
</script>
</body>
</html>
