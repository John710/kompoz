<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kompoz — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --bg4:#222736;
  --text:#c9d1d9; --text2:#8b949e; --text3:#6e7681;
  --border:#30363d; --accent:#58a6ff; --accent2:#1f6feb;
  --green:#3fb950; --red:#f85149;
  --mono:'JetBrains Mono',monospace; --display:'Inter',sans-serif;
}
html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--display); display:flex; align-items:center; justify-content:center; }
.login-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:32px; width:100%; max-width:360px; box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.login-logo { display:flex; align-items:center; gap:10px; font-size:18px; font-weight:800; margin-bottom:24px; color:var(--text); }
.login-logo svg { color:var(--accent); }
.login-field { margin-bottom:16px; }
.login-field label { display:block; font-size:11px; font-family:var(--mono); color:var(--text3); margin-bottom:6px; }
.login-field input {
  width:100%; padding:10px 12px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px;
  outline:none; transition:border .15s;
}
.login-field input:focus { border-color:var(--accent); }
.login-btn {
  width:100%; padding:10px; border-radius:8px; border:none;
  background:var(--accent); color:#fff; font-family:var(--display); font-size:13px; font-weight:700;
  cursor:pointer; transition:background .15s;
}
.login-btn:hover { background:var(--accent2); }
.login-error { margin-top:12px; font-family:var(--mono); font-size:12px; color:var(--red); text-align:center; display:none; }
.login-error.vis { display:block; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <path d="m8 21 8 0M12 17v4"/>
      <path d="m7 8 2 2-2 2M11 12h4"/>
    </svg>
    Kompoz
  </div>
  <div class="login-field">
    <label>Username</label>
    <input type="text" id="username" placeholder="user" autocomplete="username" onkeydown="if(event.key==='Enter')submitLogin()">
  </div>
  <div class="login-field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
  </div>
  <button class="login-btn" onclick="submitLogin()">Sign in</button>
  <div class="login-error" id="loginError">Invalid credentials</div>
</div>

<script>
async function submitLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.remove('vis');

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      errEl.classList.add('vis');
    }
  } catch(e) {
    errEl.textContent = 'Network error';
    errEl.classList.add('vis');
  }
}
</script>
</body>
</html>
