<!DOCTYPE html>
<html lang="ru">
<head>
<script>(function(){var t=localStorage.getItem('ce-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
<script>
  // Initialize i18n immediately to prevent flash of English text
  (function() {
    const savedLang = localStorage.getItem('ce-lang') || 'en';
    document.documentElement.lang = savedLang;
  })();
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="appTitle">Kompoz</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%235b8cff' stroke-width='2'><rect x='2' y='3' width='20' height='14' rx='2'/><path d='m8 21 8 0M12 17v4'/><path d='m7 8 2 2-2 2M11 12h4'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/header.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root[data-theme="dark"] {
  --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --bg4:#222736;
  --text:#c9d1d9; --text2:#8b949e; --text3:#6e7681;
  --border:#30363d; --accent:#58a6ff; --accent2:#1f6feb;
  --green:#3fb950; --red:#f85149; --yellow:#ffd95b;
  --root-tag:#ff9d5c; --comp-tag:#5b8cff;
  --mono:'JetBrains Mono',monospace; --display:'Inter',sans-serif;;
  --panel:#1a1e2a;
}
:root[data-theme="light"] {
  --bg:#ffffff; --bg2:#f6f8fa; --bg3:#eaeef2; --bg4:#e1e4e8;
  --text:#24292f; --text2:#57606a; --text3:#8c959f;
  --border:#d0d7de; --accent:#0969da; --accent2:#0550ae;
  --green:#1a7f37; --red:#cf222e; --yellow:#9a6700;
  --root-tag:#bf8700; --comp-tag:#0969da;
  --mono:'JetBrains Mono',monospace; --display:'Inter',sans-serif;;
  --panel:#ffffff;
}

html,body { height:100%; background:var(--bg); color:var(--text); font-family:var(--display); }

/* Main */
.main { max-width:1100px; margin:0 auto; padding:40px 24px; }
.main-title { font-size:28px; font-weight:800; margin-bottom:8px; }
.main-subtitle { font-size:13px; color:var(--text2); font-family:var(--mono); margin-bottom:32px; }

/* Grid */
.projects-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:16px; }

/* Project card */
.proj-card {
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  padding:20px; cursor:pointer; transition:all .15s;
  display:flex; flex-direction:column; gap:10px; position:relative; overflow:hidden;
}
.proj-card:hover { background:var(--bg3); border-color:var(--accent); box-shadow:0 0 0 1px var(--accent), 0 8px 24px rgba(0,0,0,.3); }

.proj-card-name { font-size:16px; font-weight:700; color:var(--text); word-break:break-word; }
.proj-card-meta { display:flex; align-items:center; gap:8px; font-family:var(--mono); font-size:11px; color:var(--text3); }
.proj-card-meta svg { color:var(--text3); }
.proj-card-badge {
  font-size:9px; padding:2px 6px; border-radius:4px;
  background:rgba(61,255,160,.12); color:var(--green); font-family:var(--mono);
  align-self:flex-start;
}

/* New project card */
.proj-card-new {
  background:transparent; border:2px dashed var(--border); border-radius:12px;
  padding:20px; cursor:pointer; transition:all .15s;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:10px; min-height:120px; color:var(--text3);
}
.proj-card-new:hover { border-color:var(--accent); color:var(--accent); background:rgba(88,166,255,.05); }
.proj-card-new .plus { font-size:32px; font-weight:300; line-height:1; }
.proj-card-new .label { font-size:13px; font-weight:600; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); display:flex; align-items:center; justify-content:center; z-index:100; opacity:0; pointer-events:none; transition:opacity .2s; }
.modal-overlay.open { opacity:1; pointer-events:all; }
.modal {
  background:var(--bg2); border:1px solid var(--border); border-radius:12px;
  width:100%; max-width:400px; padding:24px; box-shadow:0 16px 48px rgba(0,0,0,.5);
}
.modal h3 { font-size:16px; margin-bottom:16px; }
.modal-field { margin-bottom:14px; }
.modal-field label { display:block; font-size:11px; font-family:var(--mono); color:var(--text3); margin-bottom:6px; }
.modal-field input {
  width:100%; padding:9px 12px; border-radius:8px; border:1px solid var(--border);
  background:var(--bg); color:var(--text); font-family:var(--mono); font-size:13px;
  outline:none; transition:border .15s;
}
.modal-field input:focus { border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:8px; }

/* Empty state */
.empty-state { text-align:center; padding:60px 20px; color:var(--text3); }
.empty-state svg { color:var(--text3); margin-bottom:16px; }
.empty-state h3 { color:var(--text2); font-size:16px; margin-bottom:8px; }
.empty-state p { font-family:var(--mono); font-size:12px; }

/* Toast */
.toast-container { position:fixed; top:16px; right:16px; z-index:200; display:flex; flex-direction:column; gap:8px; }
.toast { padding:10px 14px; border-radius:8px; font-family:var(--mono); font-size:12px; color:#fff; box-shadow:0 4px 16px rgba(0,0,0,.4); animation:slideIn .2s ease; }
.toast.error { background:var(--red); }
.toast.success { background:var(--green); }
.toast.info { background:var(--accent); }
@keyframes slideIn { from { opacity:0; transform:translateX(20px); } }

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}
</style>
<script src="/js/header.js"></script>
<script src="/js/themes.js"></script>
<script src="/js/i18n.js"></script>
</head>
<body>

<main class="main">
  <h1 class="main-title" data-i18n="selectProject">Выберите проект</h1>
  <p class="main-subtitle" id="projectCount">Загрузка...</p>

  <div class="projects-grid" id="projectsGrid">
    <!-- Cards injected here -->
  </div>
</main>

<!-- New Project Modal -->
<div class="modal-overlay" id="newProjectModal">
  <div class="modal">
    <h3 data-i18n="newProjectTitle">Новый проект</h3>
    <div class="modal-field">
      <label data-i18n="projectNameLabel">Название (латиница, цифры, _ -)</label>
      <input type="text" id="newProjectName" data-i18n="newProjectNamePlaceholder" data-i18n-attr="placeholder" onkeydown="if(event.key==='Enter')submitNewProject()">
    </div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()" data-i18n="cancel">Отмена</button>
      <button class="btn btn-primary" onclick="submitNewProject()" data-i18n="create">Создать</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
let projects = [];
let canCreate = false;

async function loadProjects() {
  try {
    const r = await fetch('/api/projects', { cache: 'no-store' });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    projects = d.projects || [];
    canCreate = d.canCreate || false;
    renderProjects();
  } catch(e) {
    showToast(I18N.t('errorLoadProjects') + ': ' + e.message, 'error');
    document.getElementById('projectCount').textContent = '—';
  }
}

function renderProjects() {
  const grid = document.getElementById('projectsGrid');
  const countEl = document.getElementById('projectCount');

  if (!projects.length) {
    countEl.textContent = I18N.t('noProjects');
    let html = `
      <div class="empty-state" style="grid-column:1/-1">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
        </svg>
        <h3 data-i18n="noProjectsTitle">Нет проектов</h3>
        <p data-i18n="noProjectsHint">Создайте первый проект, чтобы начать</p>
      </div>
    `;
    if (canCreate) {
      html += `
        <div class="proj-card-new" onclick="openNewProjectModal()" title="${escapeHtml(I18N.t('newFileTooltip'))}">
          <div class="plus">+</div>
          <div class="label" data-i18n="newProjectTitle">Новый проект</div>
        </div>
      `;
    }
    grid.innerHTML = html;
    I18N.refresh();
    return;
  }

  countEl.textContent = `${projects.length} ${I18N.t('projectCountLabel') || 'проектов'}`;

  let html = '';
  projects.forEach(p => {
    const badge = p.direct ? `<span class="proj-card-badge">direct</span>` : '';
    html += `
      <div class="proj-card" onclick="openProject('${escapeHtml(p.name)}')">
        <div class="proj-card-name">${escapeHtml(p.name)}</div>
        ${badge}
        <div class="proj-card-meta">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
          </svg>
          <span>${p.fileCount || 0} ${I18N.t('fileCount')}</span>
        </div>
      </div>
    `;
  });

  if (canCreate) {
    html += `
      <div class="proj-card-new" onclick="openNewProjectModal()">
        <div class="plus">+</div>
        <div class="label" data-i18n="newProjectTitle">Новый проект</div>
      </div>
    `;
  }

  grid.innerHTML = html;
  I18N.refresh();
}

function openProject(name) {
  window.location.href = `/editor.html?project=${encodeURIComponent(name)}`;
}

function openNewProjectModal() {
  document.getElementById('newProjectModal').classList.add('open');
  setTimeout(() => document.getElementById('newProjectName').focus(), 50);
}

function closeModal() {
  document.getElementById('newProjectModal').classList.remove('open');
  document.getElementById('newProjectName').value = '';
}

async function submitNewProject() {
  const name = document.getElementById('newProjectName').value.trim();
  if (!name) { showToast(I18N.t('enterProjectName'), 'error'); return; }
  try {
    const r = await fetch('/api/projects', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name }),
    });
    const d = await r.json();
    if (d.error) throw new Error(d.errorKey ? I18N.t(d.errorKey) : d.error);
    showToast(I18N.t('projectCreated'), 'success');
    closeModal();
    await loadProjects();
    // Auto-open new project
    setTimeout(() => openProject(name), 300);
  } catch(e) {
    showToast(I18N.t('errorDelete') + ': ' + e.message, 'error');
  }
}

function showToast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.getElementById('toastContainer').appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}


window.addEventListener('i18n-change', () => {
  I18N.refresh();
  renderProjects();
});

window.addEventListener('i18n-change', () => {
  const isDark = Themes.get() === 'dark';
  document.querySelector('.theme-icon-dark').style.display = isDark ? '' : 'none';
  document.querySelector('.theme-icon-light').style.display = isDark ? 'none' : '';
});

document.addEventListener('DOMContentLoaded', async () => {
  await I18N.init();
  renderHeader({
    navButtons: [{
      i18n: 'networkMap',
      href: '/homelab.html',
      icon: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="19" cy="19" r="3"/><circle cx="5" cy="19" r="3"/><line x1="12" y1="8" x2="12" y2="14"/><line x1="12" y1="14" x2="19" y2="19"/><line x1="12" y1="14" x2="5" y2="19"/></svg>'
    }]
  });
  Themes.init();
  I18N.refresh();
  loadProjects();
  loadVersion();
  checkUpdate();
});

async function loadVersion() {
  try {
    const r = await fetch('/api/version', { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    const gh = document.querySelector('a[href*="github.com"]');
    if (gh && d.version) gh.setAttribute('data-tooltip', 'Kompoz v' + d.version);
  } catch {}
}

async function checkUpdate() {
  try {
    const [vr, lr] = await Promise.all([
      fetch('/api/version', { cache: 'no-store' }),
      fetch('/api/latest-release', { cache: 'no-store' })
    ]);
    if (!vr.ok || !lr.ok) return;
    const v = await vr.json();
    const l = await lr.json();
    if (!v.version || !l.tag) return;
    const cur = v.version.replace(/^v/, '').split('.').map(Number);
    const lat = l.tag.replace(/^v/, '').split('.').map(Number);
    const newer = lat[0]>cur[0] || (lat[0]===cur[0] && lat[1]>cur[1]) || (lat[0]===cur[0] && lat[1]===cur[1] && lat[2]>cur[2]);
    if (newer) {
      const gh = document.querySelector('a[href*="github.com"]');
      if (gh) {
        gh.style.position = 'relative';
        if (!gh.querySelector('.update-dot')) {
          const dot = document.createElement('span');
          dot.className = 'update-dot';
          gh.appendChild(dot);
        }
        gh.setAttribute('data-tooltip', 'Kompoz v' + v.version + ' — New ' + l.tag + ' available!');
        gh.href = l.url || 'https://github.com/John710/kompoz/releases/latest';
      }
    }
  } catch {}
}

</script>
</body>
</html>
