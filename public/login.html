<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kompoz — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/common.css">
<link rel="stylesheet" href="/css/login.css">
</head>
<body>
<div class="login-card">
  <div class="login-logo">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <path d="m8 21 8 0M12 17v4"/>
      <path d="m7 8 2 2-2 2M11 12h4"/>
    </svg>
    Kompoz
  </div>
  <div class="login-field">
    <label>Username</label>
    <input type="text" id="username" placeholder="user" autocomplete="username" onkeydown="if(event.key==='Enter')submitLogin()">
  </div>
  <div class="login-field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')submitLogin()">
  </div>
  <button class="login-btn" onclick="submitLogin()">Sign in</button>
  <div class="login-error" id="loginError">Invalid credentials</div>
</div>

<script>
async function submitLogin() {
  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;
  const errEl = document.getElementById('loginError');
  errEl.classList.remove('vis');

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password }),
    });
    const data = await r.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      errEl.classList.add('vis');
    }
  } catch(e) {
    errEl.textContent = 'Network error';
    errEl.classList.add('vis');
  }
}
</script>
</body>
</html>
