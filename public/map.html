  <div class="canvas-wrap">

      <button class="fbtn on" id="fVol" onclick="toggleFilter('vol')"><div class="fdot" style="background:var(--purple)"></div><span data-i18n="volumes">Volumes</span></button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
<script src="/js/themes.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/parser.js"></script>
<script>
const project = new URLSearchParams(location.search).get('project') || localStorage.getItem('lastProject');
document.getElementById('projLabel').textContent = project || '—';

let graphData = null;
let zoom, gMain;
const filters = { svc:true, net:true, vol:true };
const NODE = {
  svc: { w:170, h:48, gapX:20, gapY:16 },
  net: { w:130, h:34, gapX:16, gapY:12 },
  vol: { w:130, h:34, gapX:16, gapY:12 },
};
const GROUP_GAP = 40;
const MARGIN = { top:50, left:50 };

async function loadMap() {
  showOverlay(true, I18N.t('loadingMap'));
  if (!project) { showOverlay(true, I18N.t('noProject')); return; }
  try {
    const r = await fetch(`/api/files/all?project=${encodeURIComponent(project)}`, { cache: "no-store" });
    const d = await r.json();
    if (d.error) throw new Error(d.error);
    if (!d.files.length) { showOverlay(true, I18N.t('noYamlFiles')); return; }
    graphData = Parser.parseProject(d.files);
    showOverlay(false);
    buildTree();
  } catch(e) { showOverlay(true, I18N.t('errorPrefix') + ' ' + e.message); }
}

function showOverlay(show, msg) {
  const el = document.getElementById('overlay');
  el.style.display = show ? '' : 'none';
  if (show) el.innerHTML = msg === I18N.t('loadingMap')
    ? `<div class="spinner"></div><span>${msg}</span>`
    : `<span>${msg}</span>`;
}

function buildTree() {
  const svg = d3.select('#mapSvg');
  svg.selectAll('*').remove();

  zoom = d3.zoom().scaleExtent([0.3, 3])
    .wheelDelta(event => -event.deltaY * (event.deltaMode === 1 ? 0.016 : event.deltaMode ? 0.33 : 0.0007))
    .on('zoom', e => gMain.attr('transform', e.transform));
  svg.call(zoom).on('dblclick.zoom', null);
  gMain = svg.append('g');

  renderTree();
}

function renderTree() {
  if (!gMain || !graphData) return;
  gMain.selectAll('*').remove();

  const { services, networks, volumes, edges } = graphData;
  const nodes = [];
  const nodeById = {};

  if (filters.svc) services.forEach(s => {
    const n = { ...s, _type:'svc', _w:NODE.svc.w, _h:NODE.svc.h };
    nodes.push(n); nodeById[n.id] = n;
  });
  if (filters.net) networks.forEach(s => {
    const n = { ...s, _type:'net', _w:NODE.net.w, _h:NODE.net.h };
    nodes.push(n); nodeById[n.id] = n;
  });
  if (filters.vol) volumes.forEach(s => {
    const n = { ...s, _type:'vol', _w:NODE.vol.w, _h:NODE.vol.h };
    nodes.push(n); nodeById[n.id] = n;
  });

  const visEdges = edges.filter(e => nodeById[e.from] && nodeById[e.to]);
  updateCounter(nodes);

  // ── Layout ──
  const svcNodes = nodes.filter(n => n._type === 'svc');
  const netNodes = nodes.filter(n => n._type === 'net');
  const volNodes = nodes.filter(n => n._type === 'vol');

  // Calculate grid columns based on service count
  const svcCols = Math.max(3, Math.ceil(Math.sqrt(svcNodes.length * 1.3)));
  const svcRows = Math.ceil(svcNodes.length / svcCols);
  const svcBlockW = svcCols * NODE.svc.w + (svcCols - 1) * NODE.svc.gapX;
  const svcBlockH = svcRows * NODE.svc.h + (svcRows - 1) * NODE.svc.gapY;

  // Place services in a grid (center block)
  svcNodes.forEach((n, i) => {
    const c = i % svcCols;
    const r = Math.floor(i / svcCols);
    n.x = MARGIN.left + c * (NODE.svc.w + NODE.svc.gapX);
    n.y = MARGIN.top + (netNodes.length ? NODE.net.h + GROUP_GAP : 0) + r * (NODE.svc.h + NODE.svc.gapY);
  });

  // Place networks above services, centered
  if (netNodes.length) {
    const netCols = Math.min(netNodes.length, Math.max(4, Math.ceil(svcCols * 0.8)));
    const netRows = Math.ceil(netNodes.length / netCols);
    const netBlockW = netCols * NODE.net.w + (netCols - 1) * NODE.net.gapX;
    const netStartX = MARGIN.left + Math.max(0, (svcBlockW - netBlockW) / 2);
    netNodes.forEach((n, i) => {
      const c = i % netCols;
      const r = Math.floor(i / netCols);
      n.x = netStartX + c * (NODE.net.w + NODE.net.gapX);
      n.y = MARGIN.top + r * (NODE.net.h + NODE.net.gapY);
    });
  }

  // Place volumes below services, centered
  if (volNodes.length) {
    const volCols = Math.min(volNodes.length, Math.max(4, Math.ceil(svcCols * 0.8)));
    const volRows = Math.ceil(volNodes.length / volCols);
    const volBlockW = volCols * NODE.vol.w + (volCols - 1) * NODE.vol.gapX;
    const volStartX = MARGIN.left + Math.max(0, (svcBlockW - volBlockW) / 2);
    const volStartY = MARGIN.top + (netNodes.length ? NODE.net.h + GROUP_GAP : 0) + svcBlockH + GROUP_GAP;
    volNodes.forEach((n, i) => {
      const c = i % volCols;
      const r = Math.floor(i / volCols);
      n.x = volStartX + c * (NODE.vol.w + NODE.vol.gapX);
      n.y = volStartY + r * (NODE.vol.h + NODE.vol.gapY);
    });
  }

  // Compute total size
  const totalW = Math.max(svcBlockW, 600) + MARGIN.left * 2;
  const totalH = MARGIN.top + (netNodes.length ? NODE.net.h + GROUP_GAP : 0) + svcBlockH + GROUP_GAP + (volNodes.length ? Math.ceil(volNodes.length / Math.max(4, Math.ceil(svcCols * 0.8))) * (NODE.vol.h + NODE.vol.gapY) : 0) + MARGIN.top;

  // ── Column labels ──
  if (netNodes.length) {
    gMain.append('text')
      .attr('x', MARGIN.left)
      .attr('y', MARGIN.top - 10)
      .attr('font-family', 'JetBrains Mono,monospace')
      .attr('font-size', 10)
      .attr('fill', 'var(--green)')
      .text(I18N.t('networks'));
  }
  if (volNodes.length) {
    const volStartY = MARGIN.top + (netNodes.length ? NODE.net.h + GROUP_GAP : 0) + svcBlockH + GROUP_GAP - 10;
    gMain.append('text')
      .attr('x', MARGIN.left)
      .attr('y', volStartY)
      .attr('font-family', 'JetBrains Mono,monospace')
      .attr('font-size', 10)
      .attr('fill', 'var(--purple)')
      .text(I18N.t('volumes'));
  }

  // ── Draw edges (straight lines with low opacity) ──
  const linkColor = { network:'var(--green)', depends_on:'var(--yellow)', volume:'var(--purple)' };

  const linkGroup = gMain.append('g').attr('class', 'links');

  linkGroup.selectAll('line').data(visEdges).join('line')
    .attr('x1', e => { const s = nodeById[e.from]; return s ? s.x + s._w / 2 : 0; })
    .attr('y1', e => { const s = nodeById[e.from]; return s ? s.y + s._h / 2 : 0; })
    .attr('x2', e => { const t = nodeById[e.to];   return t ? t.x + t._w / 2 : 0; })
    .attr('y2', e => { const t = nodeById[e.to];   return t ? t.y + t._h / 2 : 0; })
    .attr('stroke', e => linkColor[e.kind])
    .attr('stroke-width', 1.2)
    .attr('stroke-opacity', 0.35);

  // ── Draw nodes ──
  const nodeSel = gMain.selectAll('.node').data(nodes).join('g')
    .attr('class', 'node')
    .style('cursor', 'pointer')
    .on('mouseover', (ev, d) => {
      d3.select(ev.currentTarget).select('rect').attr('stroke-width', 2.5);
      showTip(ev, d);
      const connected = new Set([d.id]);
      visEdges.forEach(e => {
        if (e.from === d.id) connected.add(e.to);
        if (e.to   === d.id) connected.add(e.from);
      });
      nodeSel.style('opacity', n => connected.has(n.id) ? 1 : 0.18);
      linkGroup.selectAll('line')
        .attr('stroke-opacity', e => (e.from === d.id || e.to === d.id) ? 0.9 : 0.06)
        .attr('stroke-width', e => (e.from === d.id || e.to === d.id) ? 2 : 1.2);
    })
    .on('mousemove', moveTip)
    .on('mouseout', (ev, d) => {
      d3.select(ev.currentTarget).select('rect').attr('stroke-width', 1.5);
      hideTip();
      nodeSel.style('opacity', 1);
      linkGroup.selectAll('line').attr('stroke-opacity', 0.35).attr('stroke-width', 1.2);
    })
    .on('click', (ev, d) => {
      if (confirm(I18N.t('openInEditor'))) {
        location.href = '/editor.html?project=' + encodeURIComponent(project);
      }
    });

  nodeSel.each(function(d) {
    const g = d3.select(this);
    if (d._type === 'svc') {
      g.append('rect').attr('x', d.x).attr('y', d.y).attr('width', d._w).attr('height', d._h)
        .attr('rx', 8).attr('fill', 'var(--bg3)').attr('stroke', 'var(--accent)').attr('stroke-width', 1.5);
      // Name
      g.append('text').attr('x', d.x + 12).attr('y', d.y + d._h / 2)
        .attr('text-anchor', 'start').attr('dominant-baseline', 'central')
        .attr('font-family', 'JetBrains Mono,monospace').attr('font-size', 11)
        .attr('fill', 'var(--text)').attr('font-weight', '600')
        .text(d.name.length > 20 ? d.name.slice(0, 19) + '…' : d.name);
      // Ports badge
      if (d.ports?.length) {
        g.append('rect').attr('x', d.x + d._w - 26).attr('y', d.y + 6).attr('width', 18).attr('height', 18)
          .attr('rx', 4).attr('fill', 'var(--bg)').attr('stroke', 'var(--yellow)').attr('stroke-width', 1)
          .style('cursor', 'help')
          .on('mouseenter', (ev) => { ev.stopPropagation(); showPortTip(ev, d.ports); })
          .on('mousemove', (ev) => { ev.stopPropagation(); moveTip(ev); })
          .on('mouseleave', (ev) => { ev.stopPropagation(); hideTip(); });
        g.append('text').attr('x', d.x + d._w - 17).attr('y', d.y + 18)
          .attr('text-anchor', 'middle').attr('font-size', 9)
          .attr('font-family', 'JetBrains Mono,monospace').attr('fill', 'var(--yellow)').text('⇌')
          .style('pointer-events', 'none');
      }
    } else if (d._type === 'net') {
      g.append('rect').attr('x', d.x).attr('y', d.y).attr('width', d._w).attr('height', d._h)
        .attr('rx', 17).attr('fill', 'var(--map-net-fill)').attr('stroke', 'var(--green)').attr('stroke-width', 1.5)
        .attr('stroke-dasharray', d.external ? '4,2' : 'none');
      g.append('text').attr('x', d.x + d._w / 2).attr('y', d.y + d._h / 2 + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('font-family', 'JetBrains Mono,monospace').attr('font-size', 10)
        .attr('fill', 'var(--green)').text(d.name.length > 16 ? d.name.slice(0, 15) + '…' : d.name);
    } else {
      g.append('rect').attr('x', d.x).attr('y', d.y).attr('width', d._w).attr('height', d._h)
        .attr('rx', 6).attr('fill', 'var(--map-vol-fill)').attr('stroke', 'var(--purple)').attr('stroke-width', 1.5);
      g.append('text').attr('x', d.x + d._w / 2).attr('y', d.y + d._h / 2 + 1)
        .attr('text-anchor', 'middle').attr('dominant-baseline', 'central')
        .attr('font-family', 'JetBrains Mono,monospace').attr('font-size', 10)
        .attr('fill', 'var(--purple)').text(d.name.length > 16 ? d.name.slice(0, 15) + '…' : d.name);
    }
  });

  // Center view
  const svgW = document.getElementById('mapSvg').clientWidth;
  const svgH = document.getElementById('mapSvg').clientHeight;
  const scale = Math.min(1, Math.min((svgW - 80) / totalW, (svgH - 80) / totalH));
  const tx = (svgW - totalW * scale) / 2;
  const ty = (svgH - totalH * scale) / 2;
  d3.select('#mapSvg').call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
}

function resolveEnv(str) {
  if (!graphData?.envVars || typeof str !== 'string') return str;
  return str.replace(/\$\{([^}]+)\}/g, (_, name) => graphData.envVars[name] !== undefined ? graphData.envVars[name] : '${' + name + '}')
            .replace(/\$([A-Za-z_]\w*)/g, (_, name) => graphData.envVars[name] !== undefined ? graphData.envVars[name] : '$' + name);
}

// Tooltip
function showTip(event, d) {
  const tt = document.getElementById('tooltip');
  let html = `<div class="tt-title">${d.name}</div>`;
  if (d._type === 'svc') {
    if (d.image)         html += `<div class="tt-row">${I18N.t('imageLabel')} <b>${d.image}</b></div>`;
    if (d.ports?.length) html += `<div class="tt-row">${I18N.t('portsLabel')} <b>${d.ports.slice(0,3).map(resolveEnv).join(', ')}${d.ports.length>3?'…':''}</b></div>`;
    if (d.networks?.length) html += `<div class="tt-row">${I18N.t('networksLabel')} <b>${d.networks.join(', ')}</b></div>`;
    html += `<div class="tt-row">${I18N.t('fileLabel')} <b>${d.sourceFile}</b></div>`;
  } else if (d._type === 'net') {
    html += `<div class="tt-row">${I18N.t('driverLabel')} <b>${d.driver}</b></div>`;
    if (d.subnet)   html += `<div class="tt-row">${I18N.t('subnetLabel')} <b>${d.subnet}</b></div>`;
    if (d.internal) html += `<div class="tt-row"><b>${I18N.t('internalLabel')}</b></div>`;
    if (d.external) html += `<div class="tt-row"><b>${I18N.t('externalLabel')}</b></div>`;
  } else {
    html += `<div class="tt-row">${I18N.t('namedVolume')}</div>`;
    html += `<div class="tt-row">${I18N.t('fileLabel')} <b>${d.sourceFile}</b></div>`;
  }
  tt.innerHTML = html;
  tt.classList.add('vis');
  moveTip(event);
}
function showPortTip(event, ports) {
  const tt = document.getElementById('tooltip');
  const html = `<div class="tt-title">${I18N.t('portsLabel')}</div>` +
    ports.map(p => `<div class="tt-row">${resolveEnv(p)}</div>`).join('');
  tt.innerHTML = html;
  tt.classList.add('vis');
  moveTip(event);
}

function moveTip(event) {
  const tt = document.getElementById('tooltip');
  const x = event.pageX + 14;
  const y = event.pageY + 14;
  tt.style.left = Math.min(x, window.innerWidth  - 270) + 'px';
  tt.style.top  = Math.min(y, window.innerHeight - 160) + 'px';
}
function hideTip() { document.getElementById('tooltip').classList.remove('vis'); }

function toggleFilter(t) {
  filters[t] = !filters[t];
  document.getElementById('f'+t.charAt(0).toUpperCase()+t.slice(1)).classList.toggle('on', filters[t]);
  renderTree();
}
function updateCounter(nodes) {
  const s = nodes.filter(n=>n._type==='svc').length;
  const n = nodes.filter(n=>n._type==='net').length;
  const v = nodes.filter(n=>n._type==='vol').length;
  document.getElementById('fcount').textContent = `${s}s · ${n}n · ${v}v`;
}

function resetZoom() {
  renderTree();
}

window.addEventListener('resize', () => {
  if (graphData && gMain) renderTree();
});


window.addEventListener('i18n-change', () => {
  I18N.refresh();
  if (graphData) renderTree();
});

window.addEventListener('i18n-change', () => {
  const isDark = Themes.get() === 'dark';
  document.querySelector('.theme-icon-dark').style.display = isDark ? '' : 'none';
  document.querySelector('.theme-icon-light').style.display = isDark ? 'none' : '';
});

document.addEventListener('DOMContentLoaded', async () => {
  await I18N.init();
  Header.render({ center: '<span data-i18n="containerMap">Container Map</span>' });
  loadUser();
  Themes.init();
  I18N.refresh();
  loadMap();
  loadVersion();
  checkUpdate();
  document.body.style.visibility = 'visible';
});

async function loadVersion() {
  try {
    const r = await fetch('/api/version', { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    const gh = document.querySelector('a[href*="github.com"]');
    if (gh && d.version) gh.setAttribute('data-tooltip', 'Kompoz v' + d.version);
  } catch {}
}

async function checkUpdate() {
  try {
    const [vr, lr] = await Promise.all([
      fetch('/api/version', { cache: 'no-store' }),
      fetch('/api/latest-release', { cache: 'no-store' })
    ]);
    if (!vr.ok || !lr.ok) return;
    const v = await vr.json();
    const l = await lr.json();
    if (!v.version || !l.tag) return;
    const cur = v.version.replace(/^v/, '').split('.').map(Number);
    const lat = l.tag.replace(/^v/, '').split('.').map(Number);
    const newer = lat[0]>cur[0] || (lat[0]===cur[0] && lat[1]>cur[1]) || (lat[0]===cur[0] && lat[1]===cur[1] && lat[2]>cur[2]);
    if (newer) {
      const gh = document.querySelector('a[href*="github.com"]');
      if (gh) {
        gh.style.position = 'relative';
        if (!gh.querySelector('.update-dot')) {
          const dot = document.createElement('span');
          dot.className = 'update-dot';
          gh.appendChild(dot);
        }
        gh.setAttribute('data-tooltip', 'Kompoz v' + v.version + ' — New ' + l.tag + ' available!');
        gh.href = l.url || 'https://github.com/John710/kompoz/releases/latest';
      }
    }
  } catch {}
}

async function logout() {
  try { await fetch('/api/logout', { method: 'POST' }); } catch {}
  window.location.href = '/login.html';
}


async function loadUser() {
  try {
    const r = await fetch('/api/me', { cache: 'no-store' });
    if (!r.ok) return;
    const d = await r.json();
    if (d.enabled && d.user) {
      const el = document.getElementById('profileName');
      if (el) el.textContent = d.user.name;
      const av = document.getElementById('profileAvatar');
      if (av) {
        if (d.user.avatar) {
          av.style.display = '';
          av.innerHTML = `<img src="${d.user.avatar}" style="width:22px;height:22px;border-radius:50%;object-fit:cover;">`;
        } else {
          av.style.display = 'none';
        }
      }
    } else {
      // Auth disabled or no user data — hide skeleton
      const el = document.getElementById('profileName');
      if (el) el.textContent = 'User';
    }
  } catch {}
}

function toggleProfileDropdown() {
  const existing = document.getElementById('profileDropdown');
  if (existing) { existing.remove(); return; }

  const btn = document.getElementById('profileBlock');
  if (!btn) return;
  const rect = btn.getBoundingClientRect();

  const html = `<div class="proj-dropdown-item" onclick="logout();document.getElementById('profileDropdown')?.remove()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
    </svg>
    ${I18N.t('logout')}
  </div>`;

  const dd = document.createElement('div');
  dd.id = 'profileDropdown';
  dd.className = 'proj-dropdown';
  dd.style.top = (rect.bottom + 4) + 'px';
  const ddWidth = Math.max(rect.width, 140);
  dd.style.width = ddWidth + 'px';
  if (rect.left + ddWidth > window.innerWidth - 8) {
    dd.style.left = 'auto';
    dd.style.right = (window.innerWidth - rect.right) + 'px';
  } else {
    dd.style.left = rect.left + 'px';
    dd.style.right = 'auto';
  }
  dd.innerHTML = html;
  document.body.appendChild(dd);

  setTimeout(() => {
    document.addEventListener('click', function h(e) {
      if (!dd.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
        dd.remove(); document.removeEventListener('click', h);
      }
    });
  }, 0);
}

</script>
