services:
  db:
    image: postgres:16-alpine
    container_name: kompoz-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kompoz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kompoz}
      POSTGRES_DB: ${POSTGRES_DB:-kompoz}
      TZ: ${TZ:-UTC}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kompoz} -d ${POSTGRES_DB:-kompoz}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  kompoz:
    image: ghcr.io/John710/kompoz:latest
    container_name: kompoz
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - /path/to/your/docker:/mnt/docker
      - /path/to/your/server:/mnt/server
    environment:
      - COMPOSE_MOUNTS=${COMPOSE_MOUNTS:-/mnt/docker,/mnt/server}
      - TZ=${TZ:-UTC}
      - PORT=${PORT:-3710}
      - DATABASE_URL=postgres://${POSTGRES_USER:-kompoz}:${POSTGRES_PASSWORD:-kompoz}@127.0.0.1:5432/${POSTGRES_DB:-kompoz}
      - AUTH_USER=${AUTH_USER:-}
      - AUTH_PASS=${AUTH_PASS:-}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - COOKIE_SECURE=${COOKIE_SECURE:-}
      - FILE_EXT_WHITELIST=${FILE_EXT_WHITELIST:-}
      - ALLOW_ALL_EXTENSIONS=${ALLOW_ALL_EXTENSIONS:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${PORT:-3710}/api/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
